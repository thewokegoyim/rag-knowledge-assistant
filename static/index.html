<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RAG Knowledge Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --accent: #7c6dfa;
  --accent2: #a594ff;
  --text: #f0eeff;
  --muted: #7a7890;
  --success: #4ade80;
  --danger: #f87171;
  --user-bg: #1e1a3d;
  --bot-bg: #13131e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(12px);
  height: 58px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
}

.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), #c084fc);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 100px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.4; }
}

/* ── SCREENS ── */
#app {
  position: fixed;
  top: 58px; bottom: 0; left: 0; right: 0;
  z-index: 1;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
}

#upload-screen {
  transform: translateX(0);
  opacity: 1;
}

#chat-screen {
  transform: translateX(100%);
  opacity: 0;
}

#app.chat-mode #upload-screen {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}

#app.chat-mode #chat-screen {
  transform: translateX(0);
  opacity: 1;
}

/* ── UPLOAD SCREEN ── */
#upload-screen {
  padding: 24px 20px;
  justify-content: center;
  align-items: stretch;
  gap: 16px;
  overflow-y: auto;
}

.upload-hero {
  text-align: center;
  margin-bottom: 8px;
}

.upload-hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.upload-hero p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

.drop-zone {
  border: 2px dashed rgba(124,109,250,0.35);
  border-radius: 20px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  background: rgba(124,109,250,0.04);
  transition: all 0.2s;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  min-height: 220px;
}

.drop-zone:active, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(124,109,250,0.1);
  transform: scale(0.99);
}

.drop-icon {
  font-size: 56px;
  line-height: 1;
}

.drop-zone h2 {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.drop-zone p {
  font-size: 13px;
  color: var(--muted);
}

.fmt-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
}

.fmt-tag {
  font-size: 11px;
  padding: 3px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--muted);
}

#file-input { display: none; }

#file-name-display {
  font-size: 13px;
  color: var(--accent2);
  text-align: center;
  min-height: 20px;
  font-weight: 500;
}

#upload-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.01em;
}

#upload-btn:active:not(:disabled) {
  transform: scale(0.98);
  background: var(--accent2);
}

#upload-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ── CHAT SCREEN ── */
#chat-screen {
  display: flex;
  flex-direction: column;
}

#chat-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

#back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

#doc-name-bar {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.doc-badge {
  font-size: 11px;
  background: rgba(74,222,128,0.1);
  color: var(--success);
  border: 1px solid rgba(74,222,128,0.2);
  padding: 3px 8px;
  border-radius: 100px;
  flex-shrink: 0;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: none;
}

#messages::-webkit-scrollbar { display: none; }

.msg-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot { align-items: flex-start; }

.msg-label {
  font-size: 10px;
  color: var(--muted);
  padding: 0 4px;
}

.msg {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 88%;
  white-space: pre-wrap;
}

.msg.user {
  background: var(--user-bg);
  border: 1px solid rgba(124,109,250,0.2);
  border-bottom-right-radius: 4px;
}

.msg.bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg.error {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--danger);
  border-bottom-left-radius: 4px;
}

.thinking-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 12px 16px;
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
}

.t-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: tdot 1.2s infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tdot {
  0%,60%,100% { transform:translateY(0); opacity:0.4; }
  30% { transform:translateY(-5px); opacity:1; }
}

/* Input bar */
.input-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}

#question {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  min-height: 42px;
  max-height: 100px;
  line-height: 1.4;
}

#question::placeholder { color: var(--muted); }
#question:focus { border-color: rgba(124,109,250,0.5); }
#question:disabled { opacity: 0.4; }

#ask-btn {
  width: 42px; height: 42px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#ask-btn:active:not(:disabled) {
  background: var(--accent2);
  transform: scale(0.95);
}

#ask-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Desktop layout */
@media (min-width: 768px) {
  #app {
    display: flex;
    flex-direction: row;
    top: 58px;
  }

  .screen {
    position: relative;
    transform: none !important;
    opacity: 1 !important;
    pointer-events: auto !important;
  }

  #upload-screen {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    justify-content: flex-start;
    padding-top: 28px;
  }

  #chat-screen {
    flex: 1;
  }

  #chat-topbar { display: none; }
  #back-btn { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    RAG Knowledge Assistant
  </div>
  <div class="status-pill">
    <span class="dot"></span>
    Live
  </div>
</header>

<div id="app">

  <!-- UPLOAD SCREEN -->
  <div class="screen" id="upload-screen">
    <div class="upload-hero">
      <h1>Ask Your Documents</h1>
      <p>Upload a file and ask anything about it</p>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📄</div>
      <h2>Tap to upload</h2>
      <p>or drag & drop your file here</p>
      <div class="fmt-row">
        <span class="fmt-tag">PDF</span>
        <span class="fmt-tag">DOCX</span>
        <span class="fmt-tag">CSV</span>
        <span class="fmt-tag">XLSX</span>
        <span class="fmt-tag">HTML</span>
      </div>
    </div>

    <input type="file" id="file-input" accept=".pdf,.docx,.csv,.xlsx,.xls,.html">
    <div id="file-name-display">No file selected</div>

    <button id="upload-btn" onclick="uploadDoc()" disabled>
      ↑ Upload & Process
    </button>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="chat-screen">
    <div id="chat-topbar">
      <button id="back-btn" onclick="goBack()">←</button>
      <div id="doc-name-bar">Chat</div>
      <span class="doc-badge">✓ Ready</span>
    </div>

    <div id="messages">
      <div class="msg-wrap bot">
        <div class="msg-label">Assistant</div>
        <div class="msg bot">Upload a document and ask me anything about it!</div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="question" placeholder="Ask a question..." disabled rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQ()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
      <button id="ask-btn" onclick="askQ()" disabled>↑</button>
    </div>
  </div>

</div>

<script>
const API = 'https://thewokegoyim-rag-knowledge-assistant.hf.space';

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

fileInput.addEventListener('change', function() {
  const f = this.files[0];
  if (f) {
    document.getElementById('file-name-display').textContent = '📎 ' + f.name;
    document.getElementById('upload-btn').disabled = false;
  }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) {
    fileInput.files = e.dataTransfer.files;
    document.getElementById('file-name-display').textContent = '📎 ' + f.name;
    document.getElementById('upload-btn').disabled = false;
  }
});

async function uploadDoc() {
  const file = fileInput.files[0];
  if (!file) return;
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Processing...';

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('doc-name-bar').textContent = file.name;
      addMsg('bot', `"${file.name}" loaded! Ask me anything about it.`);
      document.getElementById('question').disabled = false;
      document.getElementById('ask-btn').disabled = false;
      document.getElementById('app').classList.add('chat-mode');
      setTimeout(() => document.getElementById('question').focus(), 400);
    } else {
      alert('⚠ ' + (data.detail || 'Upload failed'));
    }
  } catch(e) {
    alert('⚠ Could not reach API. Check your connection.');
  }
  btn.textContent = '↑ Upload & Process';
  btn.disabled = false;
}

function goBack() {
  document.getElementById('app').classList.remove('chat-mode');
}

async function askQ() {
  const input = document.getElementById('question');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', q);
  const thinking = addThinking();

  try {
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    thinking.remove();
    addMsg('bot', data.answer || data.response || data.message || JSON.stringify(data));
  } catch(e) {
    thinking.remove();
    addMsg('error', '⚠ Could not reach API.');
  }
}

function addMsg(type, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (type === 'user' ? 'user' : 'bot');
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = type === 'user' ? 'You' : type === 'error' ? 'Error' : 'Assistant';
  const msg = document.createElement('div');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(msg);
  const msgs = document.getElementById('messages');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Assistant';
  const dots = document.createElement('div');
  dots.className = 'thinking-dots';
  dots.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
  wrap.appendChild(label);
  wrap.appendChild(dots);
  const msgs = document.getElementById('messages');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}
</script>
</body>
</html>
